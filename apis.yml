name: RoomKeyPMS
kind: company
description: RoomKeyPMS is a cloud property management system (PMS) for independent
  hotels and small chains across the US and Canada, with a team of hoteliers behind
  roughly 70,000 managed rooms. Alongside the core PMS it sells Pulse (AI marketing
  and guest messaging), Embedded Payments, Capital (growth financing), Mobile Guest,
  a built-in Distribution/CRS module, and an integrations marketplace. RoomKeyPMS
  publishes a real REST API (JSON or XML, selectable via request header) documented
  publicly at its support portal under three API types - Pulling Reservation Data,
  POS, and Statistics and Forecasts. The API is described as "a one-way interface
  that allows you to draw out key data from your hotel or chain environment" for
  use in marketing (e.g. exporting guest lists to MailChimp) and BI tools (e.g.
  Cvent). It is partner-gated - a hotel's IT team must email RoomKeyPMS support and
  the property must sign off before an API key and per-hotel credentials are issued
  - so no open self-serve signup or public sandbox exists. Endpoint paths and query
  parameters below are taken directly from RoomKeyPMS's own published support
  articles; the exact API base host is inferred from the same documentation
  (RoomKeyPMS hosts its interactive Help/reference pages alongside the live API)
  and should be confirmed once credentials are issued.
