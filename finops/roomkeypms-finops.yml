description: >-
  FinOps view of RoomKeyPMS. RoomKeyPMS is contract-priced SaaS (quote-based,
  sized by property/room count and modules enabled) rather than a
  usage-metered API - the REST API (Reservation Data, POS, Statistics) is
  bundled into the property's platform subscription with no separately
  published per-call or per-token rate. The dominant cost lens for a hotel is
  therefore the platform subscription plus optional add-ons (Pulse AI
  marketing, Embedded Payments processing fees, Capital financing, additional
  supported interfaces such as PBX/POS/door-lock connectors, some of which
  carry their own vendor fees per RoomKeyPMS's supported-interfaces
  documentation). No numeric vendor rates are reconciled here.
notes: >-
  RoomKeyPMS does not publish public per-unit pricing for the platform or the
  API. Verify current packaging and any integration-specific fees with
  RoomKeyPMS sales/support. This file models the cost/allocation shape, not
  confirmed invoice line items.
