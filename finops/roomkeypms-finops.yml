meters:
- name: platform_subscription
  description: Contract-priced PMS subscription, sized by property/room count and modules enabled. Not usage-metered per API call.
  unit: contract
  aggregation: flat
  dimensions:
  - property
  - modules
- name: third_party_interface_fees
  description: Optional per-vendor fees for supported interfaces (PBX, POS, door locks, channel managers, WiFi, RMS, reputation platforms) documented as sometimes carrying additional cost beyond the base PMS.
  unit: currency
  aggregation: sum
  dimensions:
  - property
  - interface_vendor
- name: payment_processing_volume
  description: Transaction volume processed through RoomKeyPMS Payments (USA) or Stripe (Canada/Australia) for guest folio charges, including those posted via the POS API.
  unit: currency
  aggregation: sum
  dimensions:
  - property
  - payment_method
principles:
- name: Visibility
  description: Use the Reservation Data and Statistics (Receipts) APIs to surface reservation, occupancy, and transaction activity per property for cost and revenue reporting.
- name: Allocation
  description: Map platform subscription and interface fees to individual properties in a multi-property/chain deployment.
- name: Optimization
  description: Consolidate supported interfaces where possible to avoid stacking multiple third-party integration fees on top of the base PMS subscription.
- name: Accountability
  description: Confirm with RoomKeyPMS sales whether API access, additional interfaces, or Capital financing carry incremental charges before committing a property to them.
